<!DOCTYPE html>
<html lxmls:th="http://www.thymeleaf.org">

<head>
    <th:block th:replace="~{fragments/style :: style}"></th:block>
    
    <title th:if="${edit}">Modifica Magia</title>
    <title th:unless="${edit}">Aggiungi Magia</title>
</head>

<body>
    <header>
        <th:block th:replace="~{fragments/nav :: nav}"></th:block>
    </header>
    <main>
        
        <div class="container bg-light">
            <form id="monster-create-form" th:action="${edit} ? @{|/spells/edit/${spell.id}|} : @{/spells/create}"
                method="post" th:object="${spell}" >
                <div class="pt-3 mt-3" th:if="${#fields.hasErrors()}">
                    <p class="text-danger">completa i campi con un errore</p>
                </div>
                <div class="row mt-3">
                    <div class="col-3 mb-4">
                        <div class="mt-3">
                            <label class="form-label" for="name">Nome dela magia:</label>
                            <input class="form-control" type="text" id="name" placeholder="Nome..."
                                th:field="*{name}" th:errorClass="is-invalid">
                            <div class="invalid-feedback" th:if="${#fields.hasErrors('name')}">
                                <ul>
                                    <li th:each="error : ${#fields.errors('name')}" th:text="${error}" />
                                </ul>
                            </div>
                        </div>
                        
                    </div>
                    <!-- Input nome-->

                     <div class="col-3 mb-4">
                        <div class="mt-3">
                            <label class="form-label" for="school">Scuola di magia:</label>
                            <input class="form-control" type="text" id="school" placeholder="Scuola..."
                                th:field="*{school}" th:errorClass="is-invalid">
                            <div class="invalid-feedback" th:if="${#fields.hasErrors('school')}">
                                <ul>
                                    <li th:each="error : ${#fields.errors('school')}" th:text="${error}" />
                                </ul>
                            </div>
                        </div>
                        
                    </div>
                    <!-- Input scuola-->

                    <div class="col-3 mb-4">
                        <div class="mt-3">
                            <label class="form-label" for="level">Livello:</label>
                            <input class="form-control" type="number" id="level" placeholder="0"
                                th:field="*{level}" th:errorClass="is-invalid">
                            <div class="invalid-feedback" th:if="${#fields.hasErrors('level')}">
                                <ul>
                                    <li th:each="error : ${#fields.errors('level')}" th:text="${error}" />
                                </ul>
                            </div>
                        </div>
                    </div>
                    <!-- Input livello-->

                    <div class="col-3 mb-4">
                        <div class="mt-3">
                            <label class="form-label" for="castMethod">tempo di lancio:</label>
                            <input class="form-control" type="text" id="castMethod" placeholder="azione"
                                th:field="*{castMethod}" th:errorClass="is-invalid">
                            <div class="invalid-feedback" th:if="${#fields.hasErrors('castMethod')}">
                                <ul>
                                    <li th:each="error : ${#fields.errors('castMethod')}" th:text="${error}" />
                                </ul>
                            </div>
                        </div>
                    </div>
                    <!-- Input tempo di lancio-->

                     <div class="col-4 mb-4">
                        <div class="mt-3">
                            <label class="form-label" for="castRange">gittata:</label>
                            <input class="form-control" type="text" id="castRange" placeholder="18m"
                                th:field="*{castRange}" th:errorClass="is-invalid">
                            <div class="invalid-feedback" th:if="${#fields.hasErrors('castRange')}">
                                <ul>
                                    <li th:each="error : ${#fields.errors('castRange')}" th:text="${error}" />
                                </ul>
                            </div>
                        </div>
                    </div>
                    <!-- Input gittata-->

                    <div class="col-4 mb-4">
                        <div class="mt-3">
                            <label class="form-label" for="components">componenti:</label>
                            <input class="form-control" type="text" id="components" placeholder="V,S,M"
                                th:field="*{components}" th:errorClass="is-invalid">
                            <div class="invalid-feedback" th:if="${#fields.hasErrors('components')}">
                                <ul>
                                    <li th:each="error : ${#fields.errors('components')}" th:text="${error}" />
                                </ul>
                            </div>
                        </div>
                    </div>
                    <!-- Input componenti-->

                     <div class="col-4 mb-4">
                        <div class="mt-3">
                            <label class="form-label" for="duration">durata:</label>
                            <input class="form-control" type="text" id="duration" placeholder="1 ora."
                                th:field="*{duration}" th:errorClass="is-invalid">
                            <div class="invalid-feedback" th:if="${#fields.hasErrors('duration')}">
                                <ul>
                                    <li th:each="error : ${#fields.errors('duration')}" th:text="${error}" />
                                </ul>
                            </div>
                        </div>
                    </div>
                    <!-- Input durata-->
                    <div class="col-12 mb-4">
                        <div class="mt-3">
                            <label class="form-label" for="materials">materiali:</label>
                            <input class="form-control" type="text"  id="materials" placeholder="materiali..."
                                th:field="*{materials}" th:errorClass="is-invalid">
                            <div class="invalid-feedback" th:if="${#fields.hasErrors('materials')}">
                                <ul>
                                    <li th:each="error : ${#fields.errors('materials')}" th:text="${error}" />
                                </ul>
                            </div>
                        </div>
                    </div>
                    <!-- Input materiali-->
                     <div class="col-12 mb-4">
                        <label class="form-label" for="effect">effetto:</label>
                    <textarea class="form-control" rows="6"  type="file" id="effect" placeholder="inserisci cosa fa la magia..."
                        th:field="*{effect}" th:errorClass="is-invalid"></textarea>
                    <div class="invalid-feedback" th:if="${#fields.hasErrors('effect')}">
                        <ul>
                            <li th:each="error : ${#fields.errors('effect')}" th:text="${error}" />
                        </ul>
                    </div>
                     </div>
                     <!-- Input effetto-->

                      <div class="col-12 mb-4">
                        <label class="form-label" for="upgrade">ai livelli superiori:</label>
                    <textarea class="form-control" rows="4"  type="file" id="upgrade" placeholder="inserisci come migliora ai livelli superiori..."
                        th:field="*{upgrade}" th:errorClass="is-invalid"></textarea>
                    <div class="invalid-feedback" th:if="${#fields.hasErrors('upgrade')}">
                        <ul>
                            <li th:each="error : ${#fields.errors('upgrade')}" th:text="${error}" />
                        </ul>
                    </div>
                     </div>
                     <!-- Input livelli dopo-->

                     

                <div class="col-12 d-flex justify-content-center mt-4 pb-4">
                    <button class="btn btn-primary" type="submit">Conferma</button>
                </div>
            </div>
            </form>
        </div>
    </main>
    <footer>

    </footer>
</body>
