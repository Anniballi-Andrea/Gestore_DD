<!DOCTYPE html>
<html lxmls:th="http://www.thymeleaf.org">

<head>
    <th:block th:replace="~{fragments/style :: style}"></th:block>
    <title>Oggetti Magici</title>
</head>

<body>
    <header>
        <th:block th:replace="~{fragments/nav :: nav}"></th:block>
    </header>
    <main>
        <div class="container  mt-3 ">
            <div class="row mt-5 bg_custom pt-3">
                <div class="col-12 d-flex justify-content-between">
                    <div>
                        <a sec:authorize="hasAuthority('ADMIN')" class="btn btn-sm btn-primary"
                            href="/magick_items/create">
                            <i class="bi bi-plus-square"></i>
                        </a>
                    </div>

                </div>

                <div class="col-12 mt-3" th:if="${items.size() > 0}">
                    <div class="d-flex justify-content-between">
                        <h3 class="">LISTA DELLE MAGIE:</h3>

                        <div>
                            <form th:action="@{/magick_items}" method="get">
                                <div class="d-flex align-items-center">
                                    <input class="form-control me-2" type="text" name="name" th:value="${name}"
                                        placeholder="cerca..." aria-label="Search" />
                                    <button class="btn btn-primary " type="submit">cerca</button>
                                </div>
                            </form>

                        </div>

                    </div>

                    <table class="mt-3 table">
                        <thead>
                            <tr>
                                <th> Nome</th>
                                <th> Rarità</th>
                                <th class="text-center">Apri</th>
                                <th class="text-center" sec:authorize="hasAnyAuthority('ADMIN','SPELLER')">Azioni</th>

                            </tr>
                        </thead>
                        <tbody>
                            <tr th:each="item : ${items}" th:object="${item}">
                                <td>[[*{name}]]</td>

                                <td>
                                    [[*{rarity}]]
                                </td>
                                <td class="text-center ">
                                    <a th:href="@{/magick_items/{id}(id=*{id})}" class="btn btn-primary btn-sm">
                                        <i class="bi bi-arrow-right-square"></i>
                                    </a>
                                </td>
                                <td sec:authorize="hasAnyAuthority('ADMIN','SPELLER')">
                                    <div class="d-flex justify-content-center ">
                                        <a th:href="@{/magick_items/edit/{id}(id=*{id})}"
                                            class="btn btn-success btn-sm me-3">
                                            <i class="bi bi-pencil"></i>
                                        </a>

                                        <div
                                            th:replace="~{fragments/modal :: modal(*{id}, 'Eliminare il mostro definitivamente?',@{/magick_items/delete/{id}(id=*{id})})}">
                                        </div>
                                    </div>

                                </td>

                            </tr>
                        </tbody>



                    </table>
                </div>
                <div class="col-12 d-flex justify-content-center mt-5 border-top" th:unless="${items.size() > 0}">

                    <p class="fs-5 mt-3"> nessuna magia nel database</p>
                </div>

            </div>
        </div>
    </main>
    <footer>

    </footer>
</body>
