<!DOCTYPE html>
<html lxmls:th="http://www.thymeleaf.org">

<head>
    <th:block th:replace="~{fragments/style :: style}"></th:block>
    <title>lista azioni legendarie </title>
</head>

<body>
    <header>
        <th:block th:replace="~{fragments/nav :: nav}"></th:block>
    </header>
    <main>
        <div class="container">
            <div class="d-flex justify-content-center mt-4">
                <div>
                    <a th:href="@{/monsters/{id}(id=${monsterId})}" class="btn btn-primary">
                        <i class="bi bi-arrow-left-square"></i>
                    </a>
                </div>

            </div>
            <div class="row bg-light mt-4">
                <div class="me-2 mt-3">
                    <a sec:authorize="hasAuthority('ADMIN')" class="btn btn-warning btn-sm"
                        th:href="@{/monsters/{id}/legendActions(id=${monsterId})}">
                        <i class="bi bi-plus-circle"></i>
                    </a>
                </div>
                <div class=" mt-2" th:if="${legendActions.size() > 0}">
                    <div class="row border-bottom" th:each="legendAction : ${legendActions}">
                        <div class="col-12 mt-2 mb-2">

                            <div>
                                <span class="fw-bold">[[${legendAction.name}]]: </span>
                                <span>[[${legendAction.effect}]]</span>
                            </div>
                            <div class="d-flex justify-content-end">
                                <div class="me-2">
                                    <a sec:authorize="hasAuthority('ADMIN')"
                                        th:href="@{/legendActions/edit/{id}(id=${legendAction.id})}"
                                        class="btn btn-success btn-sm">
                                        <i class="bi bi-pencil"></i>

                                    </a>
                                </div>
                                <div sec:authorize="hasAuthority('ADMIN')"
                                    th:replace="~{fragments/modal :: modal(|legendAction-${legendAction.id}|, 'confermi?', @{/legendActions/delete/{id}(id=${legendAction.id})})}">
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
                <div class="bg-light mt-2 text-center" th:unless="${legendActions.size() > 0}">
                    <div class="my-5">
                        <h4>Azioni legendarie non presenti</h4>
                    </div>
                </div>
            </div>
            <div class="d-flex justify-content-center mt-4">
                <div>
                    <a th:href="@{/monsters/{id}(id=${monsterId})}" class="btn btn-primary">
                        <i class="bi bi-arrow-left-square"></i>
                    </a>
                </div>

            </div>

        </div>
    </main>

    <footer>
        <div class="height"></div>
    </footer>
    <th:block th:replace="~{fragments/script :: scripts}"></th:block>
</body>
